# ===============================================================================
# SonarCloud Configuration for stylelint-plugin-docusaurus
# ===============================================================================

# Project identification
sonar.organization=nick2bad4u
sonar.projectKey=Nick2bad4u_stylelint-plugin-docusaurus
sonar.projectName=stylelint-plugin-docusaurus

# SonarCloud server configuration
sonar.host.url=https://sonarcloud.io

# ===============================================================================
# SOURCE CONFIGURATION
# ===============================================================================

# Main source directories (production code only)
sonar.sources=src

# Limit secondary analysis to the real test suite; repo tooling, docs, workflows,
# and benchmarks create noise that does not reflect plugin runtime quality.
sonar.tests=test

# Exclude repository tooling, docs, workflows, and generated outputs entirely so
# SonarCloud stays focused on shipped plugin code plus the core test suite.
sonar.exclusions=**/.github/**,**/benchmark/**,**/benchmarks/**,**/docs/**,**/scripts/**,**/node_modules/**,**/dist/**,**/coverage/**,**/build/**,**/temp/**,**/*.config.*,**/*.d.ts,**/*.d.mts,eslint.config.mjs,commitlint.config.mjs,stryker.config.mjs,stylelint.config.mjs

# Exclude non-production code from duplication analysis.
# Both forms are required: `test/**` matches files directly inside the test/
# directory (e.g. test/foo.ts), while `**/test/**` matches files in any
# subdirectory under test/ (e.g. test/fixtures/foo.ts). SonarQube's Ant-style
# trailing ** requires at least one path segment, so without the bare form the
# root-level test files are silently included in CPD analysis.
sonar.cpd.exclusions=test/**,tests/**,**/test/**,**/tests/**,benchmark/**,benchmarks/**,**/benchmark/**,**/benchmarks/**,scripts/**,**/scripts/**,docs/**,**/docs/**

# Restrict test analysis to first-class repository tests only.
# Both bare (test/**) and prefixed (**/test/**) forms are required for the same
# reason as sonar.cpd.exclusions — the trailing ** in **/test/** requires at
# least one path segment after the directory, so root-level files like
# test/foo.ts do not match without the bare form.
sonar.test.inclusions=test/**,tests/**,**/test/**,**/tests/**

# Disable fixtures and snapshots which intentionally contain non-idiomatic code
sonar.test.exclusions=**/test/fixtures/**,**/snapshots/**

# ===============================================================================
# LANGUAGE AND FILE TYPE CONFIGURATION
# ===============================================================================

sonar.typescript.file.suffixes=.ts,.tsx,.mts,.cts
sonar.javascript.file.suffixes=.js,.jsx,.mjs,.cjs

# Restrict Sonar's TypeScript program discovery to the root configs that define
# the plugin source/test/tooling surface. This avoids stale docs-workspace
# tsconfig warnings and keeps analysis focused on repo-local configs.
sonar.typescript.tsconfigPaths=tsconfig.json,tsconfig.build.json,tsconfig.eslint.json,tsconfig.js.json,tsconfig.vitest-typecheck.json

# ===============================================================================
# CODE COVERAGE CONFIGURATION
# ===============================================================================

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Ensure no coverage expectations on test files or non-prod folders.
# Bare forms (test/**, scripts/**, docs/**) are included alongside the **/…/**
# forms for the same Ant-style pattern reason noted on sonar.cpd.exclusions.
sonar.coverage.exclusions=test/**,**/test/**,benchmark/**,benchmarks/**,**/benchmark/**,**/benchmarks/**,scripts/**,**/scripts/**,docs/**,**/docs/**,**/.github/**,**/*.config.*,**/*.d.ts,**/*.d.mts,eslint.config.mjs

# ===============================================================================
# CODE ANALYSIS CONFIGURATION
# ===============================================================================

sonar.sourceEncoding=UTF-8
sonar.scm.provider=git

# Treat bundle logic as test/generated logic for scripts if needed
sonar.javascript.detectBundles=true

# Wait for Quality Gate
sonar.qualitygate.wait=true
