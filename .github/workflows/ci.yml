name: Continuous Integration

run-name: Continuous Integration • ${{ github.ref_name }} @${{ github.actor }}

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

on:
    push:
        branches:
            - main
    pull_request:
    merge_group:
        types:
            - checks_requested

jobs:
    test:
        name: Test (${{ matrix.label }})
        runs-on: ${{ matrix.os }}
        timeout-minutes: 60
        permissions:
            contents: read
        strategy:
            fail-fast: true
            matrix:
                include:
                    - label: linux
                      os: ubuntu-latest
                      codecov_flag: os-linux
                    - label: windows
                      os: windows-latest
                      codecov_flag: os-windows
                    - label: macos
                      os: macos-latest
                      codecov_flag: os-macos
        defaults:
            run:
                shell: bash

        steps:
            - name: Harden the runner (Audit all outbound calls)
              if: ${{ matrix.os == 'ubuntu-latest' }}
              uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
              with:
                  egress-policy: audit

            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .node-version
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci --force

            - name: Build package
              run: npm run build

            - name: Typecheck
              run: npm run typecheck

            - name: Run tests with coverage and JUnit report
              run: npx vitest run --coverage --reporter=github-actions --reporter=dot --reporter=junit --outputFile=test-report.junit.xml --silent
              env:
                  CI: "true"
                  MAX_THREADS: "1"
                  STYLELINT_PLUGIN_DOCUSAURUS_VITEST_HANGING_PROCESS_REPORTER: "true"
                  VITEST_HANGING_PROCESS_REPORTER: "true"

            - name: Verify coverage artifact
              run: python -c "from pathlib import Path; assert Path('coverage/lcov.info').is_file(), 'coverage/lcov.info was not generated'"

            - name: Verify JUnit artifact
              run: python -c "from pathlib import Path; assert Path('test-report.junit.xml').is_file(), 'test-report.junit.xml was not generated'"

            - name: Upload test results to Codecov
              if: ${{ !cancelled() && env.CODECOV_TOKEN != '' }}
              uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
              with:
                  token: ${{ env.CODECOV_TOKEN }}
                  slug: Nick2bad4u/stylelint-config-nick2bad4u
                  files: test-report.junit.xml
                  flags: ${{ matrix.codecov_flag }}
                  name: vitest-junit-${{ matrix.codecov_flag }}
                  report_type: test_results
                  fail_ci_if_error: true
                  disable_search: true
                  verbose: true

            - name: Upload coverage to Codecov
              if: ${{ !cancelled() && env.CODECOV_TOKEN != '' }}
              uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
              with:
                  token: ${{ env.CODECOV_TOKEN }}
                  slug: Nick2bad4u/stylelint-config-nick2bad4u
                  files: ./coverage/lcov.info
                  flags: ${{ matrix.codecov_flag }}
                  name: vitest-unit-coverage-${{ matrix.codecov_flag }}
                  report_type: coverage
                  fail_ci_if_error: true
                  disable_search: true
                  verbose: true

    verify:
        name: Verify pipeline
        runs-on: ubuntu-latest
        timeout-minutes: 60
        permissions:
            contents: read
        defaults:
            run:
                shell: bash

        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
              with:
                  egress-policy: audit

            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  cache: npm
                  cache-dependency-path: package-lock.json
                  node-version-file: .node-version

            - name: Install dependencies
              run: npm ci --force

            - name: Run full verification pipeline
              run: npm run release:verify
